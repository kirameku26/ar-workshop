<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MindAR Test</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #status {
            position: fixed;
            z-index: 9999;
            top: 10px;
            left: 10px;
            padding: 10px;
            background: white;
            color: black;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div id="status">読み込み中...</div>

<a-scene
    mindar-image="imageTargetSrc: ./target.mind;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera
        position="0 0 0"
        look-controls="enabled: false">
    </a-camera>

    <a-entity
        mindar-image-target="targetIndex: 0">
    </a-entity>

</a-scene>

<script>

const status = document.getElementById("status");
const scene = document.querySelector("a-scene");
const target = document.querySelector("[mindar-image-target]");

scene.addEventListener("loaded", function () {
    status.innerText = "A-Frame読み込み成功";
});

scene.addEventListener("arReady", function () {
    status.innerText = "AR起動成功\n画像をカメラに映してください";
});

scene.addEventListener("arError", function () {
    status.innerText = "AR起動エラー";
});

target.addEventListener("targetFound", function () {
    status.innerText = "ターゲット認識成功！";
});

target.addEventListener("targetLost", function () {
    status.innerText = "ターゲットを見失いました";
});

</script>

</body>
</html>
